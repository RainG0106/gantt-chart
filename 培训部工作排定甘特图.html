      if(m)m.style.marginTop="50px";
      var hdr=document.querySelector("header");
      if(hdr)hdr.style.marginTop="50px";
    }
    // 处理 gist= 参数（从 GitHub Gist 加载分享数据）
    var gistParam = p.get("gist");
    if (gistParam) {
      var roMsg = document.getElementById("roBanner");
      if (roMsg) roMsg.innerHTML = "<span>⏳</span><span>正在从 Gist 加载数据…</span>";
      console.log('[Gist分享] 开始加载 gistId=', gistParam);
      fetch('https://api.github.com/gists/' + gistParam)
        .then(function(r) {
          console.log('[Gist分享] HTTP status=', r.status);
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        })
        .then(function(gistData) {
          console.log('[Gist分享] Gist 数据已获取, files=', gistData.files ? Object.keys(gistData.files) : 'none');
          // Gist 文件格式：{ files: { "gantt-data.json": { content: "..." } } }
          var file = gistData.files && gistData.files["gantt-data.json"];
          if (!file || !file.content) {
            console.error('[Gist分享] 未找到 gantt-data.json 文件, file=', file);
            throw new Error("Gist 中未找到数据文件");
          }
          console.log('[Gist分享] 文件内容长度=', file.content.length);
          var data = JSON.parse(file.content);
          console.log('[Gist分享] JSON 解析成功, persons=', data.persons?.length, 'tasks=', data.tasks?.length);
          console.log('[Gist分享] SUSHI_CAT_AVATAR defined=', typeof SUSHI_CAT_AVATAR !== 'undefined');
          // 兼容多种数据格式
          if (data.persons && data.tasks !== undefined) {
            // 加回默认头像（Gist 里不存 avatar，或存了无效值）
            state.persons = data.persons.map(p => ({
              ...p,
              avatar: (p.avatar && (p.avatar.startsWith('data:') || p.avatar.startsWith('http'))) ? p.avatar : SUSHI_CAT_AVATAR
            }));
            state.tasks = data.tasks;
          } else if (data.record && data.record.persons) {
            state.persons = data.record.persons.map(p => ({
              ...p,
              avatar: (p.avatar && (p.avatar.startsWith('data:') || p.avatar.startsWith('http'))) ? p.avatar : SUSHI_CAT_AVATAR
            }));
            state.tasks = data.record.tasks;
          } else if (data.data) {
            state.persons = (data.data.persons || []).map(p => ({
              ...p,
              avatar: (p.avatar && (p.avatar.startsWith('data:') || p.avatar.startsWith('http'))) ? p.avatar : SUSHI_CAT_AVATAR
            }));
            state.tasks = data.data.tasks || [];
          } else {
            throw new Error("数据格式异常：无法识别的 JSON 结构");
          }
          console.log('[Gist分享] 数据已加载, persons avatar check:', state.persons[0]?.name, 'avatar set:', !!state.persons[0]?.avatar);
          // 清除 localStorage，防止旧数据覆盖
          localStorage.removeItem('aoi_gantt_v1');
          console.log('[Gist分享] 准备渲染');
          if (typeof render === "function") render();
          if (roMsg) roMsg.innerHTML = "<span>📋</span><span>只读模式 — 数据已加载（Gist）</span>";
        })
        .catch(function(e) {
          console.error("[Gist分享] 加载失败:", e);
          if (roMsg) roMsg.innerHTML = "<span>❌</span><span>Gist 加载失败：" + e.message + "</span>";
        });
    }
    var l=p.get("load");
    if(l){
      var url=decodeURIComponent(l);
      // 显示加载提示
      var roMsg=document.getElementById("roBanner");
      if(roMsg)roMsg.innerHTML="<span>⏳</span><span>正在加载分享数据…</span>";
      fetch(url).then(function(r){
        if(!r.ok)throw new Error("HTTP "+r.status);
        return r.json();
      }).then(function(d){
        // 各种可能的数据格式
        if(d&&d.persons&&d.tasks){
          state.persons=d.persons;
          state.tasks=d.tasks;
        }else if(d&&d.record&&d.record.persons){
          state.persons=d.record.persons;
          state.tasks=d.record.tasks;
        }else if(d&&d.data){
          state=d.data;
        }else if(d&&d.uri){
          // jsonstorage.net 可能返回 { uri: "..." }，需要再请求一次
          return fetch(d.uri).then(function(r2){return r2.json()}).then(function(d2){
            if(d2.persons&&d2.tasks){state.persons=d2.persons;state.tasks=d2.tasks}
            if(typeof render==="function")render();
          })
        }
        if(typeof render==="function")render();
        if(roMsg)roMsg.innerHTML="<span>📋</span><span>只读模式 — 不可编辑（数据已加载）</span>";
      }).catch(function(e){
        console.error("load error",e);
        if(roMsg)roMsg.innerHTML="<span>❌</span><span>数据加载失败："+e.message+"</span>";
      })
    }
  }catch(e){console.error("readonly init error",e)}
})();

// ═════════════════════════════════════════════════════
// GITHUB GIST AUTO-BACKUP
// ═════════════════════════════════════════════════════

const GIST_DB_NAME = 'gantt-settings';
const GIST_DB_VERSION = 2;
let gistDB = null;
let githubToken = '';
let gistId = 'b4bd20351b7d80cda87e2bee75ac23e6';
let gistAutoSaveTimer = null;

/* ---------- IndexedDB 存储（file: 协议下 localStorage 不可用） ---------- */
function initGistDB() {
  return new Promise((resolve) => {
    if (!window.indexedDB) { resolve(null); return; }
    try {
      const req = indexedDB.open(GIST_DB_NAME, GIST_DB_VERSION);
      req.onupgradeneeded = function(e) {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('settings')) {
          db.createObjectStore('settings', { keyPath: 'key' });
        }
        if (!db.objectStoreNames.contains('avatars')) {
          db.createObjectStore('avatars', { keyPath: 'personId' });
        }
      };
      req.onsuccess = function(e) { gistDB = e.target.result; resolve(gistDB); };
      req.onerror = function() { gistDB = null; resolve(null); };
    } catch(ex) { gistDB = null; resolve(null); }
  });
}

function saveGistSetting(key, value) {
  // 优先 IndexedDB，失败则降级到 localStorage
  return new Promise((resolve) => {
    if (gistDB) {
      try {
        const tx = gistDB.transaction('settings', 'readwrite');
        tx.objectStore('settings').put({ key, value });
        tx.oncomplete = () => resolve();
        tx.onerror = () => fallback();
      } catch(e) { fallback(); }
    } else {
      fallback();
    }
    function fallback() {
      try { localStorage.setItem('gist_' + key, value); } catch(e) {}
      resolve();
    }
  });
}

function getGistSetting(key) {
  return new Promise((resolve) => {
    if (gistDB) {
      try {
        const tx = gistDB.transaction('settings', 'readonly');
        const req = tx.objectStore('settings').get(key);
        req.onsuccess = (e) => resolve(e.target.result ? e.target.result.value : null);
        req.onerror = () => fallback();
      } catch(e) { fallback(); }
    } else {
      fallback();
    }
    function fallback() {
      try { resolve(localStorage.getItem('gist_' + key) || null); } catch(e) { resolve(null); }
    }
  });
}

/* ---------- 头像 IndexedDB 操作 ---------- */
async function saveAvatarToDB(personId, avatarData) {
  if (!personId) return;
  if (!avatarData || !(avatarData.startsWith('data:') || avatarData.startsWith('http'))) return;
  // 优先 IndexedDB
  if (gistDB) {
    try {
      const tx = gistDB.transaction('avatars', 'readwrite');
      tx.objectStore('avatars').put({ personId, avatarData });
    } catch(e) {}
  }
  // 同时存 localStorage 作为降级备份
  try { localStorage.setItem('avatar_' + personId, avatarData); } catch(e) {}
}

async function getAvatarFromDB(personId) {
  // 优先 IndexedDB
  if (gistDB && personId) {
    try {
      const result = await new Promise((resolve) => {
        const tx = gistDB.transaction('avatars', 'readonly');
        const req = tx.objectStore('avatars').get(personId);
        req.onsuccess = (e) => resolve(e.target.result ? e.target.result.avatarData : null);
        req.onerror = () => resolve(null);
      });
      if (result) return result;
    } catch(e) {}
  }
  // 降级：从 localStorage 读取
  try {
    const data = localStorage.getItem('avatar_' + personId);
    return (data && data.startsWith('data:')) ? data : null;
  } catch(e) { return null; }
}

async function getAllAvatarsFromDB() {
  const avatars = {};
  // 优先 IndexedDB
  if (gistDB) {
    try {
      const items = await new Promise((resolve) => {
        const tx = gistDB.transaction('avatars', 'readonly');
        const req = tx.objectStore('avatars').getAll();
        req.onsuccess = (e) => resolve(e.target.result || []);
        req.onerror = () => resolve([]);
      });
      items.forEach(item => {
        if (item && item.personId) avatars[item.personId] = item.avatarData;
      });
      return avatars;  // IndexedDB 成功，直接返回
    } catch(e) {}
  }
  // 降级：从 localStorage 读取所有头像
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('avatar_')) {
        const personId = key.replace('avatar_', '');
        const data = localStorage.getItem(key);
        if (data && data.startsWith('data:')) avatars[personId] = data;
      }
    }
  } catch(e) {}
  return avatars;
}

async function deleteAvatarFromDB(personId) {
  if (!personId) return;
  if (gistDB) {
    try {
      const tx = gistDB.transaction('avatars', 'readwrite');
      tx.objectStore('avatars').delete(personId);
    } catch(e) {}
  }
  try { localStorage.removeItem('avatar_' + personId); } catch(e) {}
}

/* ---------- 头像渲染辅助：返回头像 URL（data URL 或 http URL） ---------- */
function getAvatarSrc(avatarData) {
  if (!avatarData) return SUSHI_CAT_AVATAR;
  if (avatarData.startsWith('http')) return avatarData;
  if (!avatarData.startsWith('data:')) return SUSHI_CAT_AVATAR;
  return avatarData;
}

async function loadAvatarsForAllPersons() {
  try {
    const avatarMap = await getAllAvatarsFromDB();
    let restored = 0;
    state.persons.forEach(p => {
      if (avatarMap[p.id]) {
        p.avatar = avatarMap[p.id];
        restored++;
      } else if (p.avatar && p.avatar.startsWith('data:')) {
        saveAvatarToDB(p.id, p.avatar);
        restored++;
      } else {
        p.avatar = SUSHI_CAT_AVATAR;
      }
    });
    console.log('[Avatars] IndexedDB找到头像:', Object.keys(avatarMap).length, '，已恢复:', restored, '，state.persons[0].avatar前60:', state.persons[0]?.avatar?.substring(0,60));
  } catch(e) { console.error('[Avatars] loadAvatarsForAllPersons error:', e); }
}

/* ---------- 加载设置到内存 ---------- */
async function loadGistSettings() {
  await initGistDB();
  // 只在不覆盖硬编码值的情况下加载
  const savedToken = await getGistSetting('github-token');
  const savedGistId = await getGistSetting('gist-id');
  if (savedToken) githubToken = savedToken;
  if (savedGistId) gistId = savedGistId;
  const btn = document.getElementById('settingsBtn');
  if (btn) {
    btn.classList.toggle('connected', !!githubToken);
    btn.title = githubToken ? '⚙️ GitHub（已连接）' : '⚙️ GitHub（未设置）';
  }
  return githubToken;
}

/* ---------- GitHub Gist：保存（公开，用于分享） ---------- */
async function saveToGist() {
  if (!githubToken) return;
  // 不存头像到 Gist（base64 太大，Gist 单文件限制 1MB）
  const personsClean = state.persons.map(p => {
    const { avatar, ...rest } = p;
    return rest;
  });
  const payload = {
    public: true,
    files: {
      'gantt-data.json': {
        content: JSON.stringify({ persons: personsClean, tasks: state.tasks }, null, 2)
      }
    }
  };
  try {
    let url = 'https://api.github.com/gists';
    let method = 'POST';
    if (gistId) { url = `https://api.github.com/gists/${gistId}`; method = 'PATCH'; }
    const resp = await fetch(url, {
      method: method,
      headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (!gistId && data.id) {
      gistId = data.id;
      await saveGistSetting('gist-id', gistId);
    }
    console.log('[Gist] 自动备份成功', gistId || data.id);
    return true;
  } catch(e) { console.error('[Gist] 备份失败:', e.message); return false; }
}

async function manualGistBackup() {
  if (!githubToken) {
    notify('⚠️ 请先填写 GitHub Token', 'error');
    return;
  }
  notify('⏳ 正在手动备份到 Gist...', 'success');
  try {
    const ok = await saveToGist();
    if (ok) {
      notify('✅ 已手动备份到 Gist', 'success');
    } else {
      notify('❌ 备份失败，请查看控制台', 'error');
    }
  } catch(e) {
    notify('❌ 备份出错：' + e.message, 'error');
  }
}

/* ---------- GitHub Gist：加载 ---------- */
async function loadFromGist() {
  if (!githubToken || !gistId) { console.log('[Gist] 未配置 Token 或 Gist ID'); return false; }
  try {
    console.log('[Gist] 开始加载，gistId=', gistId);
    const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { 'Authorization': `token ${githubToken}` }
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const gist = await resp.json();
    const content = gist.files && gist.files['gantt-data.json'] && gist.files['gantt-data.json'].content;
    if (!content) { console.log('[Gist] 文件内容为空'); return false; }
    const data = JSON.parse(content);
    console.log('[Gist] 加载成功，persons=', data.persons?.length, 'tasks=', data.tasks?.length);
    if (data.persons && data.tasks !== undefined) {
      state.persons = data.persons.map(p => ({
        ...p,
        avatar: SUSHI_CAT_AVATAR
      }));
      state.tasks = data.tasks;
      console.log('[Gist] 数据已写入 state, persons=', state.persons.length);
      // 从 IndexedDB 恢复头像
      await loadAvatarsForAllPersons();
      render();
      requestAnimationFrame(() => {
        const el = document.getElementById('personCount');
        if (el) {
          el.textContent = state.persons.length + ' 人';
          console.log('[Gist] 直接更新 personCount:', state.persons.length, '人');
        } else {
          console.error('[Gist] personCount 元素未找到！');
        }
        renderPersonList();
        console.log('[Gist] requestAnimationFrame 强制刷新完成');
      });
      notify('✅ 已从 GitHub Gist 恢复数据', 'success');
      return true;
    }
  } catch(e) { console.error('[Gist] 加载失败:', e.message); }
  return false;
}

/* ---------- 生成分享链接 ---------- */
async function generateShareLink() {
  if (!githubToken) { notify('⚠️ 请先在设置中填写 GitHub Token', 'error'); return; }
  
  // 强制创建新的公开 Gist（避免旧的私有 Gist 无法被他人读取）
  gistId = null;
  
  notify('⏳ 正在保存到 Gist...', 'success');
  await saveToGist();
  if (!gistId) { notify('❌ 保存失败，无法生成链接', 'error'); return; }
  // 分享链接：用当前页面地址 + gist 参数
  const currentUrl = window.location.href.split('?')[0];
  const shareUrl = currentUrl + '?readonly=1&gist=' + gistId;
  navigator.clipboard.writeText(shareUrl).then(() => {
    notify('✅ 分享链接已复制！打开后自动读最新数据', 'success');
    console.log('[分享链接]', shareUrl);
  }).catch(() => {
    prompt('复制此链接分享：', shareUrl);
  });
}

/* ---------- 设置弹窗 ---------- */
function openSettingsModal() {
  const modal = document.getElementById('settingsModal');
  document.getElementById('githubTokenInput').value = githubToken ? '●●●●●●●●●●●●●●●●' : '';
  document.getElementById('gistIdInput').value = gistId || '';
  document.getElementById('gistStatus').style.display = 'none';
  modal.classList.add('active');
}

function closeSettingsModal() {
  document.getElementById('settingsModal').classList.remove('active');
}

async function saveGitHubSettings() {
  const tokenInput = document.getElementById('githubTokenInput').value.trim();
  if (tokenInput && !tokenInput.startsWith('●')) {
    githubToken = tokenInput;
    await saveGistSetting('github-token', githubToken);
  }
  // 处理 Gist ID：清空则删除，有值则更新
  const gistInput = document.getElementById('gistIdInput').value.trim();
  if (!gistInput) {
    gistId = null;
    await saveGistSetting('gist-id', '');
  } else if (gistInput !== gistId) {
    gistId = gistInput;
    await saveGistSetting('gist-id', gistId);
  }
  if (githubToken && !gistId) await saveToGist();
  const btn = document.getElementById('settingsBtn');
  if (btn) {
    btn.classList.toggle('connected', !!githubToken);
    btn.title = githubToken ? '⚙️ GitHub（已连接）' : '⚙️ GitHub（未设置）';
  }
  notify(githubToken ? '✅ GitHub 设置已保存' : '⚠️ 未填写 Token', 'success');
  closeSettingsModal();
  if (githubToken) saveToGist();
}

async function testGistConnection() {
  const tokenInput = document.getElementById('githubTokenInput').value.trim();
  const token = (tokenInput && !tokenInput.startsWith('●')) ? tokenInput : githubToken;
  const statusEl = document.getElementById('gistStatus');
  if (!token) {
    statusEl.style.display = 'block';
    statusEl.style.background = '#ffeaea'; statusEl.style.color = '#c00';
    statusEl.textContent = '❌ 请先填写 GitHub Token';
    return;
  }
  statusEl.style.display = 'block';
  statusEl.style.background = '#e8f5e9'; statusEl.style.color = '#2e7d32';
  statusEl.textContent = '⏳ 正在测试连接…';
  try {
    const resp = await fetch('https://api.github.com/user', {
      headers: { 'Authorization': `token ${token}` }
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const user = await resp.json();
    statusEl.style.background = '#e8f5e9'; statusEl.style.color = '#2e7d32';
    statusEl.textContent = `✅ 连接成功！用户：${user.login}`;
    githubToken = token;
    await saveGistSetting('github-token', githubToken);
    const btn = document.getElementById('settingsBtn');
    if (btn) { btn.classList.add('connected'); btn.title = `⚙️ GitHub（${user.login}）`; }
  } catch(e) {
    statusEl.style.background = '#ffeaea'; statusEl.style.color = '#c00';
    statusEl.textContent = '❌ 连接失败：' + e.message;
  }
}

/* ---------- Monkey Patch saveState 加入防抖自动备份 ---------- */
(function patchSaveState() {
  const orig = saveState;
  window.saveState = function() {
    orig();
    if (gistAutoSaveTimer) clearTimeout(gistAutoSaveTimer);
    if (githubToken) {
      gistAutoSaveTimer = setTimeout(() => { saveToGist(); }, 3000);
    }
  };
})();

/* ---------- 修改 init 函数，启动时加载 Gist ---------- */
(function patchInit() {
  const _init = init;
  window.init = async function() {
    await loadGistSettings();  // 等 IndexedDB 完全初始化完成
    // 优先从 Gist 加载，成功则直接渲染，不再走 localStorage
    if (githubToken && gistId) {
      const ok = await loadFromGist();
      if (ok) { 
        console.log('[patchInit] Gist 加载成功，跳过 _init()');
        return;  // loadFromGist() 内部已调用 render()
      }
    }
    // 否则走原来的逻辑：先让 _init() 从 localStorage 加载 state.persons，再恢复头像
    console.log('[patchInit] Gist 未配置或加载失败，走 localStorage');
    _init();  // _init() 内部会加载 localStorage 并调用 render()
    // 此时 state.persons 已填充，再从 IndexedDB 恢复头像
    await loadAvatarsForAllPersons();
    render();  // 头像已更新，重新渲染
  };
})();

document.addEventListener('DOMContentLoaded', init);

// Close menus on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.export-dropdown')) document.getElementById('exportMenu').classList.remove('show');
});
