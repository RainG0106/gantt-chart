<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>培训组 · 工作行事历</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --primary: #1a2a4a;
  --secondary: #ffb7c5;
  --accent: #7cb342;
  --bg: #faf8f5;
  --surface: #ffffff;
  --text: #333333;
  --muted: #888888;
  --border: #e8e0d8;
  --theory: #5c9ead;
  --tech: #e8a87c;
  --practice: #95c77d;
  --support: #c38d9e;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(26,42,74,0.08);
  --shadow-hover: 0 8px 30px rgba(26,42,74,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === HEADER === */
.header {
  background: linear-gradient(135deg, var(--primary) 0%, #2d4a7a 100%);
  color: white;
  padding: 20px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(26,42,74,0.2);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-icon {
  font-size: 32px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.header-title {
  font-family: 'Quicksand', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1px;
}

.header-subtitle {
  font-size: 12px;
  opacity: 0.7;
  font-weight: 400;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn {
  border: none;
  border-radius: 10px;
  padding: 8px 16px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.btn-primary {
  background: var(--secondary);
  color: var(--primary);
  font-weight: 700;
}

.btn-primary:hover { background: #ffd4de; transform: translateY(-1px); }

.btn-ghost {
  background: rgba(255,255,255,0.15);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
}

.btn-ghost:hover { background: rgba(255,255,255,0.25); }

.settings-btn {
  background: rgba(255,255,255,0.15);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 10px;
  padding: 8px 16px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.settings-btn:hover { background: rgba(255,255,255,0.25); }
.settings-btn.connected { background: rgba(124,195,66,0.3); border-color: var(--accent); }

.btn-sm {
  padding: 5px 10px;
  font-size: 12px;
  border-radius: 8px;
}

.btn-danger { background: #ff6b6b; color: white; }
.btn-danger:hover { background: #ff5252; }
.btn-success { background: var(--accent); color: white; }
.btn-success:hover { background: #6ba32e; }

/* === MAIN LAYOUT === */
.main {
  display: flex;
  height: calc(100vh - 76px);
}

/* === LEFT SIDEBAR === */
.sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  height: 100%;
  transition: width 0.3s ease, min-width 0.3s ease;
}

.sidebar.collapsed {
  width: 50px;
  min-width: 50px;
  overflow: hidden !important;
}

.sidebar-section {
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-header {
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #f9f6f2;
}

.sidebar-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.sidebar-content {
  padding: 8px;
  overflow-y: auto;
}

.sidebar-content::-webkit-scrollbar { width: 4px; }
.sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* === PERSON CARD === */
.person-card {
  background: var(--bg);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
  position: relative;
}

.person-card:hover {
  border-color: var(--secondary);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.person-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.person-avatar {
  font-size: 28px;
  line-height: 1;
}

.person-info { flex: 1; }

.person-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
}

.person-position {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.person-abilities {
  display: flex;
  gap: 6px;
  margin-top: 4px;
  flex-wrap: wrap;
}

.pa-item {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 4px;
  background: #f0f0f0;
  color: #666;
}

.pa-item.pa-theory { background: rgba(92,158,173,0.12); color: #3a7a8a; }
.pa-item.pa-tech { background: rgba(232,168,124,0.15); color: #b07840; }
.pa-item.pa-support { background: rgba(195,141,158,0.15); color: #8a4058; }

.star-sm { font-size: 10px; color: #ccc; }
.star-sm.on { color: #f0a020; }

.capacity-bar {
  display: flex;
  gap: 3px;
  margin-top: 3px;
}

.cap-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
}

.cap-dot.filled { background: var(--secondary); }

.cap-dot.overload { background: #ff6b6b; animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.ability-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 4px;
  font-size: 11px;
}

.ability-label {
  width: 56px;
  color: var(--muted);
  flex-shrink: 0;
  white-space: nowrap;
  font-size: 11px;
}

.ability-stars {
  display: flex;
  gap: 1px;
}

.star {
  width: 12px; height: 12px;
  background: var(--border);
  border-radius: 2px;
  transition: background 0.2s;
}

.star.on { background: #ffd700; }

.star.on.theory { background: var(--theory); }
.star.on.tech { background: var(--tech); }
.star.on.support { background: var(--support); }

.person-delete {
  position: absolute;
  top: 6px; right: 8px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #ff6b6b;
  color: white;
  border: none;
  font-size: 12px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.person-card:hover .person-delete { display: flex; }

.person-edit {
  position: absolute;
  top: 6px; right: 32px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #4a90d9;
  color: white;
  border: none;
  font-size: 12px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.person-card:hover .person-edit { display: flex; }


/* === ADD PERSON FORM === */
.add-form {
  padding: 10px;
  background: #faf8f5;
  border-top: 1px solid var(--border);
  display: none;
}
.add-form.show { display: block; }

.form-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}

.form-input {
  flex: 1;
  padding: 7px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px;
  background: white;
  transition: border-color 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: var(--secondary);
}

/* === AVATAR IMAGE UPLOAD === */
.avatar-upload-section {
  margin-bottom: 10px;
  padding: 8px;
  background: var(--bg);
  border-radius: 10px;
  border: 1.5px dashed var(--border);
}

.avatar-preview-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.avatar-preview {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  overflow: hidden;
  border: 2px solid var(--secondary);
  flex-shrink: 0;
}

.avatar-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.avatar-btn-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.avatar-upload-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 8px;
  background: var(--secondary);
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}

.avatar-upload-btn:hover { background: #ffd4de; }

.avatar-clear-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 8px;
  background: var(--border);
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.15s;
}

.avatar-clear-btn:hover { background: #e0d8d0; color: var(--text); }

.avatar-input {
  display: none;
}

.avatar-hint {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

.person-card .person-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  overflow: hidden;
  border: 2px solid var(--border);
  flex-shrink: 0;
}

.person-card .person-avatar img,
.person-card .person-avatar .avatar-emoji {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.gantt-row-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  overflow: hidden;
  border: 2px solid var(--border);
  flex-shrink: 0;
}

.gantt-row-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.ability-set {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 8px;
}

.ability-input-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}

.ability-input-row .ability-label {
  width: 36px;
  color: var(--text);
  font-weight: 500;
}

.star-selector {
  display: flex;
  gap: 3px;
}

.star-btn {
  width: 18px; height: 18px;
  border-radius: 4px;
  background: var(--border);
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}

.star-btn.on { background: #ffd700; }
.star-btn.on.theory { background: var(--theory); }
.star-btn.on.tech { background: var(--tech); }
.star-btn.on.support { background: var(--support); }

/* === TASK POOL === */
.task-pool {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

.task-template {
  background: var(--bg);
  border-radius: 12px;
  padding: 10px 12px;
  cursor: grab;
  transition: all 0.2s;
  border: 2px solid transparent;
  display: flex;
  align-items: center;
  gap: 8px;
}

.task-template:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
  border-color: var(--secondary);
}

.task-template:active { cursor: grabbing; }

.task-template.theory { border-left: 4px solid var(--theory); }
.task-template.tech { border-left: 4px solid var(--tech); }
.task-template.practice { border-left: 4px solid var(--practice); }
.task-template.support { border-left: 4px solid var(--support); }
.task-template.custom { border-left: 4px solid var(--primary); }

.task-template-icon { 
  font-size: 11px; 
  font-weight: 800; 
  color: white;
  padding: 3px 6px;
  border-radius: 4px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.task-template-info { flex: 1; }
.task-template-name { font-size: 13px; font-weight: 600; }
.task-template-days { font-size: 11px; color: var(--muted); }

.add-task-btn {
  width: 100%;
  padding: 10px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: all 0.2s;
  font-family: 'Noto Sans SC', sans-serif;
}

.add-task-btn:hover {
  border-color: var(--secondary);
  color: var(--primary);
  background: #fff5f7;
}

/* === GANTT AREA === */
.gantt-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: visible;
  background: var(--bg);
}

.gantt-toolbar {
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.gantt-toolbar-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--primary);
}

.view-toggle {
  display: flex;
  background: var(--bg);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
}

.view-btn {
  padding: 5px 14px;
  border: none;
  background: transparent;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  color: var(--muted);
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
}

.view-btn.active {
  background: var(--primary);
  color: white;
  font-weight: 600;
}

.gantt-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.gantt-nav-date {
  font-size: 14px;
  font-weight: 600;
  color: var(--primary);
  min-width: 160px;
  text-align: center;
  font-family: 'Quicksand', sans-serif;
}

.nav-btn {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-size: 14px;
  color: var(--text);
}

.nav-btn:hover { border-color: var(--secondary); background: #fff5f7; }

.today-btn {
  padding: 5px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--secondary);
  background: var(--secondary);
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.15s;
}

.today-btn:hover { background: #ffd4de; }

/* === GANTT CHART === */
.gantt-scroll {
  flex: 1;
  overflow-x: auto;
  overflow-y: auto;
  position: relative;
  min-width: 0;
  max-width: 100%;
  /* 固定宽度 = 可用视口宽，动态更新 */
  width: 100%;
}

.gantt-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
.gantt-scroll::-webkit-scrollbar-track { background: #f0ebe5; border-radius: 8px; }
.gantt-scroll::-webkit-scrollbar-thumb { background: #ccc0b5; border-radius: 8px; }

.gantt-table {
  display: grid;
  min-width: 0;
  position: relative;
  z-index: 1;
}

/* === GANTT ROWS === */
.gantt-labels {
  position: sticky;
  left: 0;
  z-index: 10;
  background: var(--surface);
  border-right: 2px solid var(--border);
}

.gantt-label-header {
  height: 50px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  background: #f5f0ea;
  border-bottom: 2px solid var(--border);
}

.gantt-row {
  display: grid;
  grid-items-align: stretch;
  border-bottom: 1px solid var(--border);
  min-height: 60px;
  position: relative;
}

.gantt-row:hover { background: #fdf9f5; }

.gantt-row-header {
  height: 60px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  border-right: 2px solid var(--border);
  border-bottom: 1px solid #e8e0d8;
  position: sticky;
  left: 0;
  background: var(--surface);
  z-index: 5;
  flex-shrink: 0;
}

.gantt-row-avatar { font-size: 24px; }
.gantt-row-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  white-space: nowrap;
}

.gantt-row-load {
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
}

.gantt-day-cell {
  border-right: 1px solid #e8e0d8;
  border-bottom: 1px solid #e8e0d8;
  height: 60px;
  position: relative;
  min-width: 0;
  flex-shrink: 0;
}

.gantt-day-cell.weekend { background: #faf7f3; }
.gantt-day-cell.today-col { background: rgba(255,183,197,0.15); }
.gantt-day-cell.addable:hover { background: rgba(255,183,197,0.25); }

/* === GANTT TIMELINE === */
.gantt-timeline {
  position: sticky;
  top: 0;
  z-index: 30;
  display: flex;
  background: #f5f0ea;
  border-bottom: 2px solid var(--border);
  height: 50px;
  grid-column: 1 / -1;
  align-self: start;
}

.gantt-corner {
  grid-column: 1;
  grid-row: 1;
  background: #ede7e0;
  border-right: 2px solid var(--border);
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  position: sticky;
  left: 0;
  top: 0;
  z-index: 20;
  flex-shrink: 0;
}

.gantt-day-header {
  height: 50px;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-right: 1px solid #ddd5cc;
  border-bottom: 2px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  gap: 1px;
  background: #f5f0ea;
  flex-shrink: 0;
}

.gantt-timeline-days {
  display: flex;
  flex: 1;
  height: 50px;
  min-width: 0;
}

.gantt-day-header {
  height: 50px;
  min-width: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-right: 1px solid #ddd5cc;
  font-size: 11px;
  color: var(--muted);
  gap: 1px;
}

.gantt-day-header .day-num {
  font-size: 15px;
  font-weight: 700;
  color: var(--primary);
  font-family: 'Quicksand', sans-serif;
}

.gantt-day-header.weekend { background: #f0e8df; }
.gantt-day-header.today-col { background: rgba(255,183,197,0.3); }
.gantt-day-header.weekend.today-col { background: rgba(255,183,197,0.4); }
.gantt-day-header .day-num.today { color: #ff6b6b; }

/* === GANTT BARS === */
.gantt-bar {
  position: relative;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 4px;
  font-size: 12px;
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 3;
  overflow: hidden;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.gantt-bar:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 6px 16px rgba(0,0,0,0.2);
  z-index: 5;
}

.gantt-bar.dragging {
  opacity: 0.8;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3) !important;
  z-index: 100 !important;
  transition: none;
}

.gantt-bar-resize-handle {
  position: absolute;
  right: 0;
  top: 0;
  width: 10px;
  height: 100%;
  cursor: e-resize;
  border-radius: 0 8px 8px 0;
  z-index: 2;
}

.gantt-bar-resize-handle:hover {
  background: rgba(255,255,255,0.2);
}

.gantt-bar.theory { background: linear-gradient(135deg, var(--theory), #7ab8c5); }
.gantt-bar.tech { background: linear-gradient(135deg, var(--tech), #f0b88c); }
.gantt-bar.practice { background: linear-gradient(135deg, var(--practice), #b0d790); }
.gantt-bar.support { background: linear-gradient(135deg, var(--support), #d8a8b8); }
.gantt-bar.store { background: linear-gradient(135deg, #f5c107, #f7d44a); }
.gantt-bar.custom { background: linear-gradient(135deg, var(--primary), #3d5a8a); }

.gantt-bar-icon { 
  font-size: 10px; 
  font-weight: 800; 
  color: white;
  padding: 2px 5px;
  border-radius: 3px;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.gantt-bar-text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.gantt-bar-delete {
  position: absolute;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(0,0,0,0.3);
  color: white;
  border: none;
  font-size: 12px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
}

.gantt-bar:hover .gantt-bar-delete { display: flex; }

/* === MATCHING PANEL === */
.match-panel {
  padding: 12px 20px;
  background: linear-gradient(135deg, #fff9fb, #f5f0ea);
  border-top: 2px solid var(--secondary);
  display: none;
}

.match-panel.active { display: block; }

.match-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.match-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.match-task-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  color: white;
  font-weight: 600;
}

.match-cards {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 4px;
}

.match-cards::-webkit-scrollbar { height: 4px; }
.match-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.match-card {
  background: white;
  border-radius: 12px;
  padding: 12px;
  min-width: 180px;
  box-shadow: var(--shadow);
  border: 2px solid transparent;
  transition: all 0.2s;
}

.match-card:hover { border-color: var(--secondary); transform: translateY(-2px); }

.match-card-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}

.match-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
.match-name { font-size: 13px; font-weight: 700; color: var(--primary); }
.match-position { font-size: 11px; color: var(--muted); margin-left: 4px; }

.match-stars {
  font-size: 11px;
  color: #ffd700;
  letter-spacing: -1px;
}

.match-load {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 6px;
}

.match-abilities {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
}

.match-ability-chip {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 6px;
  font-weight: 600;
}

.chip-theory { background: rgba(92,158,173,0.15); color: var(--theory); }
.chip-tech { background: rgba(232,168,124,0.15); color: var(--tech); }
.chip-support { background: rgba(195,141,158,0.15); color: var(--support); }

.match-btn {
  width: 100%;
  padding: 7px;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: white;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.15s;
}

.match-btn:hover { background: #6ba32e; transform: scale(1.02); }

/* === MODAL === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,42,74,0.4);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  width: 420px;
  max-width: 95vw;
  box-shadow: 0 20px 60px rgba(26,42,74,0.2);
  animation: modalIn 0.25s ease-out;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.modal-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.modal-close:hover { background: var(--secondary); }

.modal-field {
  margin-bottom: 14px;
}

.modal-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 5px;
  display: block;
}

.modal-input, .modal-select {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px;
  background: var(--bg);
  transition: border-color 0.2s;
}

.modal-input:focus, .modal-select:focus {
  outline: none;
  border-color: var(--secondary);
  background: white;
}

.modal-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.modal-footer {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
}

/* === TASK TYPE SELECTOR === */
.task-type-select {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.task-type-opt {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  border: 2px solid var(--border);
  background: white;
  transition: all 0.15s;
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--text);
}

.task-type-opt:hover { border-color: var(--secondary); }
.task-type-opt.selected { color: white; font-weight: 600; }
.task-type-opt.theory.selected { background: var(--theory); border-color: var(--theory); }
.task-type-opt.tech.selected { background: var(--tech); border-color: var(--tech); }
.task-type-opt.practice.selected { background: var(--practice); border-color: var(--practice); }
.task-type-opt.support.selected { background: var(--support); border-color: var(--support); }
.task-type-opt.store.selected { background: #8b6fc6; border-color: #8b6fc6; }

/* === QUICK MATCH INPUT === */
.quick-add-bar {
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
}

.quick-add-input {
  flex: 1;
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px;
  background: var(--bg);
  transition: all 0.2s;
}

.quick-add-input:focus {
  outline: none;
  border-color: var(--secondary);
  background: white;
  box-shadow: 0 0 0 3px rgba(255,183,197,0.2);
}

.quick-add-btn {
  padding: 8px 18px;
  border: none;
  border-radius: 20px;
  background: var(--secondary);
  color: var(--primary);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}

.quick-add-btn:hover { background: #ffd4de; transform: scale(1.03); }

/* === TOOLTIP === */
.gantt-tooltip {
  position: fixed;
  background: var(--primary);
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 12px;
  pointer-events: none;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.15s;
  box-shadow: 0 4px 15px rgba(26,42,74,0.3);
  max-width: 200px;
}

.gantt-tooltip.show { opacity: 1; }

.tooltip-title { font-weight: 700; margin-bottom: 3px; }
.tooltip-date { opacity: 0.7; font-size: 11px; white-space: pre-line; }

/* === EMPTY STATE === */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--muted);
  gap: 12px;
}

.empty-icon { font-size: 48px; opacity: 0.5; }
.empty-text { font-size: 14px; text-align: center; }

/* === CONFLICT INDICATOR === */
.conflict-badge {
  position: absolute;
  top: -6px; right: -6px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #ff6b6b;
  color: white;
  font-size: 10px;
  font-weight: 700;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 6;
  border: 2px solid white;
}

.gantt-bar.has-conflict .conflict-badge { display: flex; }

/* === CAPACITY CELLS === */
.cell-capacity {
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 2px;
}

.cell-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border);
}

.cell-dot.used { background: var(--secondary); }
.cell-dot.overload { background: #ff6b6b; }

/* === DRAG OVER === */
.gantt-row.drag-over {
  background: rgba(255,183,197,0.1);
  outline: 2px dashed var(--secondary);
  outline-offset: -4px;
}

/* === SIDEBAR INNER TOGGLE BTN === */
.sidebar-toggle-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border-radius: 8px;
  border: none;
  background: rgba(26,42,74,0.08);
  color: var(--primary);
  font-size: 16px;
  cursor: pointer;
  transition: background 0.15s;
  flex-shrink: 0;
}
.sidebar-toggle-inner:hover { background: rgba(26,42,74,0.15); }

/* === SIDEBAR COLLAPSED PERSON DOTS === */
.sidebar.collapsed .sidebar-content { display: flex !important; flex-direction: column; align-items: center; padding: 6px 4px; }
.sidebar.collapsed .add-form { display: none !important; }
.sidebar.collapsed .sidebar-header { padding: 10px 4px; justify-content: center; flex-direction: column; gap: 6px; }
.sidebar.collapsed .sidebar-title { display: none; }
.sidebar.collapsed .sidebar-toggle-inner { display: flex !important; }
.sidebar.collapsed #addPersonBtn { display: none !important; }

/* 折叠状态：人员卡片变成小圆圈 */
.sidebar.collapsed .person-card {
  width: 36px; height: 36px;
  border-radius: 50%;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 6px;
  border: 2px solid transparent;
  background: var(--bg);
  overflow: hidden;
  position: relative;
}
.sidebar.collapsed .person-card .person-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  overflow: hidden;
}
.sidebar.collapsed .person-card .person-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}
.sidebar.collapsed .person-card .person-card-header,
.sidebar.collapsed .person-card .person-info,
.sidebar.collapsed .person-card .person-abilities,
.sidebar.collapsed .person-card .capacity-bar,
.sidebar.collapsed .person-card .person-delete,
.sidebar.collapsed .person-card .person-edit { display: none !important; }

/* === EXPORT BTN === */
.export-dropdown {
  position: relative;
}

.export-menu {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  background: white;
  border-radius: 10px;
  box-shadow: var(--shadow-hover);
  border: 1px solid var(--border);
  overflow: hidden;
  display: none;
  z-index: 50;
  min-width: 140px;
}

.export-menu.show { display: block; }

.export-menu-item {
  padding: 10px 14px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text);
  transition: background 0.15s;
  border: none;
  background: none;
  width: 100%;
  font-family: 'Noto Sans SC', sans-serif;
}

.export-menu-item:hover { background: var(--bg); }

/* === MATCH LEVEL BADGE === */
.match-level {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 6px;
  font-weight: 700;
}

.level-3 { background: #ffd700; color: #7a6000; }
.level-2 { background: #c0d8f0; color: #2d5a8a; }
.level-1 { background: var(--border); color: var(--muted); }

/* === NOTIFICATION === */
.notify {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--primary);
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  font-size: 13px;
  box-shadow: var(--shadow-hover);
  z-index: 1000;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s;
  pointer-events: none;
}

.notify.show { opacity: 1; transform: translateY(0); }
.notify.success { background: var(--accent); }
.notify.error { background: #ff6b6b; }

/* === ABILITY RADAR (mini) === */
.ability-mini {
  display: flex;
  gap: 4px;
  margin-top: 2px;
}

.ability-mini-bar {
  height: 4px;
  border-radius: 2px;
  flex: 1;
}

.ability-mini-bar.theory { background: var(--theory); }
.ability-mini-bar.tech { background: var(--tech); }
.ability-mini-bar.support { background: var(--support); }

/* === DROP ZONE === */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  margin-top: 8px;
  transition: all 0.2s;
}

.drop-zone.drag-active {
  border-color: var(--secondary);
  background: rgba(255,183,197,0.1);
  color: var(--primary);
}

/* === SCROLLBAR === */
* { scrollbar-width: thin; scrollbar-color: #ccc0b5 #f5f0ea; }
</style>
</head>
<body>
<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="header-icon">🍣</div>
    <div>
      <div class="header-title">培训组 · 工作行事历</div>
    </div>
  </div>
  <div class="header-actions">
    <div class="export-dropdown">
      <button class="btn btn-ghost" onclick="toggleExportMenu()">📤 导出</button>
      <div class="export-menu" id="exportMenu">
        <button class="export-menu-item" onclick="exportTaskCSV()">📋 导出任务明细CSV</button>
        <button class="export-menu-item" onclick="openExportTaskModal()">📊 导出任务明细Excel</button>
        <button class="export-menu-item" onclick="exportCSV()">📊 导出人员CSV</button>
        <button class="export-menu-item" onclick="document.getElementById('jsonFileInput').click()">📂 导入备份JSON</button>
        <button class="export-menu-item" onclick="exportJSON()">📦 导出备份JSON</button>
        <button class="export-menu-item" onclick="generateShareLink()">🔗 生成分享链接</button>
      </div>
      <input type="file" id="jsonFileInput" accept=".json" style="display:none">
    </div>
    <button class="btn btn-primary" onclick="console.log('btn clicked');openAddTaskModal()">➕ 添加任务</button>
    <button class="settings-btn" id="settingsBtn" onclick="openSettingsModal()" title="GitHub 备份设置">⚙️ GitHub</button>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar collapsed" id="sidebar">
    <!-- 人员管理 -->
    <div class="sidebar-section" style="flex-shrink:0;display:flex;flex-direction:column">
      <div class="sidebar-header">
        <span class="sidebar-title">👥 培训人员 <span id="personCount" style="font-weight:400;color:var(--muted);font-size:11px">0 人</span></span>
        <div style="display:flex;gap:4px;align-items:center">
          <button class="btn btn-sm" id="addPersonBtn" onclick="document.getElementById('addPersonForm').classList.toggle('show');" style="padding:2px 8px;font-size:12px">+</button>
          <button class="sidebar-toggle-inner" id="sidebarToggleInner" onclick="toggleSidebar()">☰</button>
        </div>
      </div>
      <div id="personListContent">
        <div class="sidebar-content" id="personList"></div>
      <div class="add-form" id="addPersonForm">
        <div class="form-row">
          <input class="form-input" id="newName" placeholder="姓名，如：小明" maxlength="10">
        </div>
        <div class="form-row">
          <input class="form-input" id="newPosition" placeholder="职位，如：培训主管" maxlength="20">
        </div>
        <!-- 图片头像上传 -->
        <div class="avatar-upload-section">
          <div class="avatar-preview-area">
            <div class="avatar-preview" id="newAvatarPreview"><img src="" alt="头像"></div>
            <div class="avatar-btn-group">
              <label class="avatar-upload-btn" for="newAvatarInput">📷 上传头像</label>
              <button class="avatar-clear-btn" onclick="resetToSushiCat('new')">🐱 恢复默认</button>
            </div>
          </div>
          <input type="file" class="avatar-input" id="newAvatarInput" accept="image/*" onchange="handleNewAvatarUpload(event)">
          <div class="avatar-hint">建议正方形图片，自动裁剪为圆形</div>
        </div>
        <div class="ability-set">
          <div class="ability-input-row">
            <span class="ability-label">理论培训</span>
            <div class="star-selector" data-type="theory" id="newTheoryStars">
              <button class="star-btn" data-val="1">★</button>
              <button class="star-btn" data-val="2">★</button>
              <button class="star-btn" data-val="3">★</button>
              <button class="star-btn" data-val="4">★</button>
              <button class="star-btn" data-val="5">★</button>
            </div>
          </div>
          <div class="ability-input-row">
            <span class="ability-label">技术培训</span>
            <div class="star-selector" data-type="tech" id="newTechStars">
              <button class="star-btn" data-val="1">★</button>
              <button class="star-btn" data-val="2">★</button>
              <button class="star-btn" data-val="3">★</button>
              <button class="star-btn" data-val="4">★</button>
              <button class="star-btn" data-val="5">★</button>
            </div>
          </div>
          <div class="ability-input-row">
            <span class="ability-label">扶持经验</span>
            <div class="star-selector" data-type="support" id="newSupportStars">
              <button class="star-btn" data-val="1">★</button>
              <button class="star-btn" data-val="2">★</button>
              <button class="star-btn" data-val="3">★</button>
              <button class="star-btn" data-val="4">★</button>
              <button class="star-btn" data-val="5">★</button>
            </div>
          </div>
        </div>
        <button class="btn btn-success" style="width:100%" onclick="addPerson()">✅ 添加人员</button>
      </div>

    </div>    </div>
  </aside>

  <!-- GANTT AREA -->
  <div class="gantt-area">
    <!-- Match Panel -->
    <div class="match-panel" id="matchPanel">
      <div class="match-header">
        <span class="match-title" id="matchTitle">🎯 推荐人员</span>
        <button class="btn btn-sm btn-ghost" onclick="closeMatchPanel()" style="font-size:11px">✕ 关闭</button>
      </div>
      <div class="match-cards" id="matchCards"></div>
    </div>

    <!-- Toolbar -->
    <div class="gantt-toolbar">
      <div class="gantt-toolbar-title" id="navDate">近30天</div>
    </div>

    <!-- Gantt Chart -->
    <div class="gantt-scroll" id="ganttScroll">
      <div class="gantt-table" id="ganttTable"></div>
    </div>
  </div>
</div>


<!-- MODAL: Add/Edit Task -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTaskTitle">➕ 添加任务</span>
      <button class="modal-close" onclick="closeTaskModal()">✕</button>
    </div>
    <div class="modal-field">
      <label class="modal-label">任务名称</label>
      <input class="modal-input" id="taskNameInput" placeholder="例如：新加盟商理论培训">
    </div>
    <div class="modal-field">
      <label class="modal-label">任务类型 <button onclick="addTaskType()" style="margin-left:8px;padding:2px 8px;font-size:11px;cursor:pointer;border:1px dashed #aaa;background:transparent;border-radius:3px">+ 添加类型</button></label>
      <div class="task-type-select" id="taskTypeSelect"></div>
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label class="modal-label">开始日期</label>
        <input class="modal-input" type="date" id="taskStartInput" oninput="refreshPersonSelect()">
      </div>
      <div class="modal-field">
        <label class="modal-label">结束日期</label>
        <input class="modal-input" type="date" id="taskEndInput" oninput="refreshPersonSelect()">
      </div>
    </div>
    <div class="modal-field" id="taskPersonField">
      <label class="modal-label">分配给</label>
      <select class="modal-select" id="taskPersonSelect">
        <option value="">— 选择人员 —</option>
      </select>

function updateAvatarPreview(previewId, avatarData, emoji) {
  const preview = document.getElementById(previewId);
  if (!preview) return;
  if (avatarData) {
    const avatarUrl = getAvatarSrc(avatarData);

    preview.innerHTML = emoji || '🐱';
  }

// 压缩头像，避免 base64 太长导致 localStorage 静默截断
function compressAvatar(dataURL, callback) {
  var img = new Image();
  img.onload = function() {
    var MAX = 64, w = img.width, h = img.height;
    if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
    else { w = Math.round(w * MAX / h); h = MAX; }
    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    var compressed = canvas.toDataURL('image/jpeg', 0.7);
    console.log('[compressAvatar]', dataURL.length, '->', compressed.length);
    callback(compressed);
  };
  img.onerror = function() { callback(dataURL); };
  img.src = dataURL;
}

function resetToSushiCat(mode) {
  if (mode === 'new') {
    newAvatarBase64 = SUSHI_CAT_AVATAR;

  } else {
    editAvatarBase64 = SUSHI_CAT_AVATAR;

function handleNewAvatarUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    // 先压缩，避免 base64 太长导致 localStorage 静默截断
    compressAvatar(e.target.result, function(compressed) {
      newAvatarBase64 = compressed;
      updateAvatarPreview('newAvatarPreview', compressed, null);
    });
  };
  reader.readAsDataURL(file);
}

function handleEditAvatarUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    compressAvatar(e.target.result, function(compressed) {
      editAvatarBase64 = compressed;
      updateAvatarPreview('editAvatarPreview', compressed, null);
    });
  };
  reader.readAsDataURL(file);
}

function createTaskFromTemplate(taskType, personId, dropDate) {
  const tpl = TASK_TEMPLATES[taskType] || { name: '自定义任务', days: 3, icon: '✨', color: 'var(--primary)' };
  const today = fmtDate(new Date());
  const startDate = dropDate || today;
  const endDate = fmtDate(addDays(parseDate(startDate), tpl.days - 1));
  state.tasks.push({
    id: Date.now().toString(),
    name: tpl.name,
    type: taskType,
    icon: tpl.icon,
    startDate,
    endDate,
    personId: personId || '',
    note: '',
  });
  saveState();
  render();
  notify('✅ ' + tpl.icon + ' ' + tpl.name + ' 已添加');
}

function resetStarSelectors() {
  ['newTheory','newTech','newSupport'].forEach(id => {
    const el = document.getElementById(id + 'Stars');
    if (el) el.querySelectorAll('.star-btn').forEach(b => { b.classList.remove('on', 'theory', 'tech', 'support'); });
  });
}

// ═══════════════════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════════════════
function setupDragAndDrop() {
  document.querySelectorAll('.task-template').forEach(tpl => {
    tpl.addEventListener('dragstart', e => {
      e.dataTransfer.setData('taskType', tpl.dataset.task);
      e.dataTransfer.setData('source', 'template');
    });
  });

  const ganttScroll = document.getElementById('ganttScroll');
  if (!ganttScroll) {
    console.warn('[setupDragAndDrop] #ganttScroll 未找到，跳过拖放初始化');
  } else {
    ganttScroll.addEventListener('dragover', e => {
      e.preventDefault();
      ganttScroll.querySelectorAll('.gantt-row').forEach(r => r.classList.remove('drag-over'));
      const row = e.target.closest('.gantt-row');
      if (row) row.classList.add('drag-over');
    });

    ganttScroll.addEventListener('dragleave', e => {
      if (!ganttScroll.contains(e.relatedTarget)) {
        ganttScroll.querySelectorAll('.gantt-row').forEach(r => r.classList.remove('drag-over'));
      }
    });

    ganttScroll.addEventListener('drop', e => {
      e.preventDefault();
      ganttScroll.querySelectorAll('.gantt-row').forEach(r => r.classList.remove('drag-over'));
      const row = e.target.closest('.gantt-row');
      if (!row) return;
      const personId = row.dataset.personId;
      const taskType = e.dataTransfer.getData('taskType');
      const col = e.target.closest('.gantt-day-cell');
      const dropDate = col ? col.dataset.date : null;
      if (!personId || !taskType) return;
      createTaskFromTemplate(taskType, personId, dropDate);
    });
  }

  const dropZone = document.getElementById('dropZone');
  if (!dropZone) {
    console.warn('[setupDragAndDrop] #dropZone 未找到，跳过拖放初始化');
  } else {
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-active'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-active'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-active');
      const taskType = e.dataTransfer.getData('taskType');
      if (taskType) createTaskFromTemplate(taskType, null, null);
    });
  }
}

  } else {
    // 新建模式：开始日期默认为今天或传入的日期，结束日期根据模板天数计算
    const startDate = initStartDate || fmtDate(new Date());
    document.getElementById('taskStartInput').value = startDate;
    const tplDays = TASK_TEMPLATES[selectedTaskType]?.days || 3;
    const endDate = fmtDate(addDays(parseDate(startDate), tplDays - 1));
    document.getElementById('taskEndInput').value = endDate;
  }

  renderTaskTypeSelect();
  selectTaskType(selectedTaskType);
  // 编辑模式：隐藏人员选择，保留原人员
  if (taskId) {
    const personField = document.getElementById('taskPersonField');
    if (personField) personField.style.display = 'none';
    const t = state.tasks.find(x => x.id === taskId);
    if (t) state._editTaskPersonId = t.personId;
  } else {
    const personField = document.getElementById('taskPersonField');
    if (personField) personField.style.display = '';
    state._editTaskPersonId = null;
    // 传入当前任务类型、开始日期、结束日期进行过滤
    const sd = document.getElementById('taskStartInput').value;
    const ed = document.getElementById('taskEndInput').value;
    updatePersonSelect(selectedTaskType, sd, ed);
    if (personId) {
      document.getElementById('taskPersonSelect').value = personId;
    }
  }
  // 日期变化自动刷新人员列表
  document.getElementById('taskStartInput').onchange = function() {
    // 开始日期变化时，自动重新计算结束日期
    const startDate = document.getElementById('taskStartInput').value;
    const tplDays = TASK_TEMPLATES[selectedTaskType]?.days || 3;
    if (startDate && !isNaN(parseDate(startDate))) {
      const endDate = fmtDate(addDays(parseDate(startDate), tplDays - 1));
      document.getElementById('taskEndInput').value = endDate;
    }
    refreshPersonSelect();
  };
  document.getElementById('taskEndInput').onchange = refreshPersonSelect;

  modal.classList.add('active');
  } catch(e) {
    console.error('openAddTaskModal error:', e);
    alert('错误: ' + e.message);
  }
}

function renderTaskTypeSelect() {
  const container = document.getElementById('taskTypeSelect');
  if (!container) return;
  const types = TASK_TEMPLATES;
  container.innerHTML = Object.entries(types).map(([key, t]) => {
    return `<button class="task-type-opt ${key}" data-type="${key}" onclick="selectTaskType('${key}')">
      ${t.name}
      <span onclick="event.stopPropagation();deleteTaskType('${key}')" style="margin-left:4px;cursor:pointer;opacity:0.6;font-size:11px" title="删除此类型">✕</span>
    </button>`;
  }).join('') + `<button class="task-type-opt custom" data-type="custom" onclick="selectTaskType('custom')">✨ 其他</button>`;
}

function deleteTaskType(key) {
  const name = TASK_TEMPLATES[key]?.name || key;
  if (!confirm(`确定删除任务类型「${name}」？已有该类型的任务不会受影响。`)) return;
  delete TASK_TEMPLATES[key];
  saveTaskTemplates(TASK_TEMPLATES);
  renderTaskTypeSelect();
  if (selectedTaskType === key) {
    const firstKey = Object.keys(TASK_TEMPLATES)[0];
    if (firstKey) selectTaskType(firstKey);
  }
}

function addTaskType() {
  const name = prompt('输入新任务类型名称（如：巡店指导）：');
  if (!name || !name.trim()) return;
  const days = parseInt(prompt('默认持续天数（如：3）：', '3')) || 3;
  const key = 'custom_' + Date.now();
  TASK_TEMPLATES[key] = {
    name: name.trim(),
    days: days,
    type: key,
    icon: name.trim().slice(0, 2),
    color: '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0')
  };
  saveTaskTemplates(TASK_TEMPLATES);

function selectTaskType(type) {
  if (type !== 'custom') {
    selectedTaskType = type;
  }
  document.querySelectorAll('.task-type-opt').forEach(o => o.classList.remove('selected'));
  document.querySelector(`.task-type-opt[data-type="${type}"]`)?.classList.add('selected');
  const startDate = document.getElementById('taskStartInput').value;
  const tplDays = TASK_TEMPLATES[type]?.days || 3;
  if (startDate) {

function refreshPersonSelect() {
  const type = selectedTaskType;
  const sd = document.getElementById('taskStartInput').value;
  const ed = document.getElementById('taskEndInput').value;
  updatePersonSelect(type, sd, ed);
}

function updatePersonSelect(taskType, startDate, endDate) {
  const sel = document.getElementById('taskPersonSelect');
  // 严格校验：两个日期都能解析为有效时间戳才做冲突检查
  const sTs = startDate ? parseDate(startDate) : NaN;
  const eTs = endDate  ? parseDate(endDate)  : NaN;
  const validRange = (!isNaN(sTs) && !isNaN(eTs) && sTs <= eTs);
  const weights = ABILITY_WEIGHTS[taskType] || ABILITY_WEIGHTS.custom;

  // 过滤：该时间段无冲突 且 对应能力>0星
  const abilityKey = TASK_TYPE_ABILITY[taskType] || null;

  const available = state.persons.filter(p => {
    // 时间冲突检查：该时间段内有任务则排除
    if (validRange) {
      const hasOverlap = state.tasks.some(t => {
        if (t.personId !== p.id) return false;
        const tStart = parseDate(t.startDate);
        const tEnd   = parseDate(t.endDate);
        if (isNaN(tStart) || isNaN(tEnd)) return false;
        return !(tEnd < sTs || tStart > eTs);
      });
      if (hasOverlap) return false;
    }
    // 能力过滤：对应能力为0星不显示
    if (abilityKey) {
      // theory/tech/support：该能力>0才显示
      if (p[abilityKey] === 0) return false;
    } else {
      // practice（门店实操）：三项能力全为0不显示
      if (p.theory === 0 && p.tech === 0 && p.support === 0) return false;
    }
    return true;
  });

  // 按能力分数排序（高→低）
  const scored = available.map(p => {
    const score = (p.theory * weights.theory + p.tech * weights.tech + p.support * weights.support);
    return { ...p, _score: score };
  }).sort((a, b) => b._score - a._score);

  let html = '<option value="">— 选择人员 —</option>';
  if (scored.length === 0) {
    html += '<option disabled>⚠️ 无符合条件的人员</option>';
  }
  scored.forEach(p => {
    const filled = Math.max(0, Math.min(3, Math.round(p._score / 5)));
    const bar = '★'.repeat(filled) + '☆'.repeat(3 - filled);
    html += `<option value="${p.id}">${p.emoji || '😊'} ${p.name} ${bar}</option>`;
  });
  sel.innerHTML = html;
}

function saveTask() {
  const name = document.getElementById('taskNameInput').value.trim();
  const startDate = document.getElementById('taskStartInput').value;
  const endDate = document.getElementById('taskEndInput').value;
  const note = document.getElementById('taskNoteInput').value.trim();

  if (!name) { notify('请输入任务名称', 'error'); return; }
  if (!startDate) { notify('请选择开始日期', 'error'); return; }
  if (!endDate) { notify('请选择结束日期', 'error'); return; }
  if (parseDate(endDate) < parseDate(startDate)) { notify('结束日期不能早于开始日期', 'error'); return; }

  const tpl = TASK_TEMPLATES[selectedTaskType];

  if (state.editingTaskId) {
    // 编辑模式：只更新时间、人员不变
    const t = state.tasks.find(x => x.id === state.editingTaskId);
    if (t) {
      t.name = name;
      t.type = selectedTaskType;
      t.icon = tpl?.icon || '✨';
      t.startDate = startDate;
      t.endDate = endDate;
      t.note = note;
    }
  } else {
    // 新建模式：必须选人员
    const personId = document.getElementById('taskPersonSelect').value;
    if (!personId) { notify('请选择人员', 'error'); return; }
    state.tasks.push({
      id: Date.now().toString(),
      name,
      type: selectedTaskType,
      icon: tpl?.icon || '✨',
      startDate,
      endDate,
      personId,
      note,
    });
  }

  closeTaskModal();
  saveState();
  render();
  notify('✅ 任务已保存');
}

function closeTaskModal() {
  document.getElementById('taskModal').classList.remove('active');
  state.editingTaskId = null;
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  saveState();
  render();
  notify('🗑️ 任务已删除');
}

// SMART MATCHING
// ═══════════════════════════════════════════════════════
function calculateMatch(personId, taskType) {
  const p = state.persons.find(x => x.id === personId);
  if (!p) return 0;
  const w = ABILITY_WEIGHTS[taskType] || ABILITY_WEIGHTS.custom;
  const totalWeight = w.theory + w.tech + w.support;
  const score = (p.theory * w.theory + p.tech * w.tech + p.support * w.support) / (totalWeight * 5) * 100;
  return Math.round(score);
}

function findMatches(taskType, taskName) {
  if (state.persons.length === 0) return [];
  const abilityKey = TASK_TYPE_ABILITY[taskType] || null;
  return state.persons.filter(p => {
    // 能力过滤：对应能力为0星不显示
    if (abilityKey) {
      if (p[abilityKey] === 0) return false;
    } else {
      // practice：三项全为0不显示
      if (p.theory === 0 && p.tech === 0 && p.support === 0) return false;
    }
    return true;
  }).map(p => {
    const score = calculateMatch(p.id, taskType);
    const load = getPersonLoadInRange(p.id);
    return { ...p, score, load };
  }).sort((a, b) => b.score - a.score);
}

function getPersonLoadInRange(personId) {
  const dates = getLast30Days();
  const start = dates[0];
  const end = dates[dates.length - 1];
  return state.tasks.filter(t =>
    t.personId === personId &&
    !(parseDate(t.endDate) < start || parseDate(t.startDate) > end)
  ).length;
}

function quickAddTask() {
  const input = document.getElementById('quickTaskInput').value.trim();
  if (!input) return;
  const taskType = detectTaskType(input);
  const tpl = TASK_TEMPLATES[taskType] || { name: input, days: 3, icon: '✨' };
  showMatchPanel(tpl.name, taskType, input !== tpl.name ? input : null);
}

function detectTaskType(text) {
  const t = text.toLowerCase();
  if (t.includes('理论') || t.includes('课程') || t.includes('学习')) return 'theory';
  if (t.includes('技术') || t.includes('刀工') || t.includes('握') || t.includes('刺身')) return 'tech';
  if (t.includes('实操') || t.includes('门店') || t.includes('实习')) return 'practice';
  if (t.includes('扶持') || t.includes('支持') || t.includes('辅导') || t.includes('带店')) return 'support';
  if (t.includes('门店扶持')) return 'store';
  return 'custom';
}

function showMatchPanel(taskName, taskType, customName) {
  const panel = document.getElementById('matchPanel');

  const matches = findMatches(taskType, customName || taskName);
  if (matches.length === 0) {
    cards.innerHTML = '<div class="empty-state" style="padding:30px"><div class="empty-icon">👥</div><div class="empty-text">暂无人员，请先添加培训人员</div></div>';
  } else {

      const levelClass = { 3:'level-3', 2:'level-2', 1:'level-1' }[level];
      const today = fmtDate(new Date());

      const startDate = nextFree || today;

          <span class="match-name">${m.name}</span>${m.position ? '<span class="match-position">${m.position}</span>' : ""}

}

function getWeekDates(base) {
  const d = new Date(base);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  const dates = [];
  for (let i = 0; i < 7; i++) dates.push(addDays(d, i));
  return dates;
}

function getMonthDates(base) {
  const d = new Date(base);
  d.setDate(1);
  const dates = [];
  const end = new Date(d.getFullYear(), d.getMonth() + 1, 0);
  for (let i = 0; i < end.getDate(); i++) dates.push(addDays(d, i));
  return dates;
}

function getLast30Days() {
  const dates = [];
  const today = new Date();
  // 今天前5天开始，共30天 → 今天在第6格（索引5），不会紧贴最右侧
  const START_OFFSET = -5;
  const TOTAL_DAYS = 30;
  for (let i = 0; i < TOTAL_DAYS; i++) {
    dates.push(addDays(today, START_OFFSET + i));
  }
  return dates;
}

function getDisplayDates() {
  return getLast30Days();
}

function renderGantt() {
  const table = document.getElementById('ganttTable');
  const scrollEl = document.getElementById('ganttScroll');
  const dates = getDisplayDates();
  const today = fmtDate(new Date());
  // 只显示有任务的人员
  const displayPersons = state.persons.filter(function(p){return (state.tasks||[]).some(function(t){return t.personId===p.id})});
  const dayCount = dates.length;

  // 计算每天列宽：总宽减去标签列，精确像素分配
  const totalWidth = scrollEl ? scrollEl.clientWidth : window.innerWidth - 340;
  const labelW = 120;
  const availW = totalWidth - labelW;
  const dayW = Math.max(30, Math.floor(availW / dayCount));
  const actualW = labelW + dayW * dayCount;

  // 单一 CSS Grid 表：列 = 标签列120px + N个日期列，行 = 1个表头行 + N个人员行
  table.style.display = 'grid';
  table.style.gridTemplateColumns = `${labelW}px repeat(${dayCount}, ${dayW}px)`;
  table.style.gridTemplateRows = `50px repeat(${Math.max(state.persons.length, 1)}, 60px)`;
  table.style.width = actualW + 'px';
  table.style.minWidth = actualW + 'px';
  table.style.overflow = 'hidden';
  table.style.position = 'relative';
  table.innerHTML = '';

  // ── 第1行：日期表头 ──────────────────────────────────────────
  // 左上角空白格
  const corner = document.createElement('div');
  corner.className = 'gantt-corner';
  table.appendChild(corner);

  // 日期列头
  dates.forEach((d, i) => {
    const ds = fmtDate(d);
    const isToday = ds === today;
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    const cell = document.createElement('div');
    cell.className = `gantt-day-header${isWeekend?' weekend':''}${isToday?' today-col':''}`;
    cell.style.gridColumn = i + 2;
    cell.style.gridRow = 1;
    cell.style.width = dayW + 'px';
    cell.dataset.date = ds;
    cell.innerHTML = `<span class="day-num${isToday?' today':''}">${d.getDate()}</span><span>${'日一二三四五六'[d.getDay()]}</span>`;
    table.appendChild(cell);
  });

  // ── 人员行 ──────────────────────────────────────────────────
  if (state.persons.length === 0) {
    // 空状态
    const empty = document.createElement('div');
    empty.style.gridColumn = `1 / ${dayCount + 2}`;
    empty.style.gridRow = 2;
    empty.style.display = 'flex';
    empty.style.flexDirection = 'column';
    empty.style.alignItems = 'center';
    empty.style.justifyContent = 'center';
    empty.style.gap = '12px';
    empty.style.color = 'var(--muted)';
    empty.style.minHeight = '200px';
    empty.innerHTML = `<div style="font-size:48px;opacity:0.4">🍣</div><div style="font-size:14px;text-align:center">暂无人员<br>请先在左侧添加培训人员</div>`;
    table.appendChild(empty);
    return;
  }

  displayPersons.forEach((p, rowIdx) => {
    const rowNum = rowIdx + 2;

    // 左侧人员标签
    // 左侧人员标签
    let avatarHtml;
    if (p.emoji && p.emoji !== '') {
      avatarHtml = p.emoji;
    } else {
      const avatarUrl = getAvatarSrc(p.avatar);
      avatarHtml = `<img src="${avatarUrl}" alt="${p.name}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:none" onerror="this.outerHTML='😊'">`;
    }
    const label = document.createElement('div');
    label.className = 'gantt-row-header';
    label.style.gridColumn = 1;
    label.style.gridRow = rowNum;
    label.innerHTML = `<span class="gantt-row-avatar">${avatarHtml}</span><div><div class="gantt-row-name">${p.name}</div><div class="gantt-row-load">已排 ${getPersonLoadInRange(p.id)} 个</div></div>`;
    table.appendChild(label);

    // 日期格子（背景色）
    dates.forEach((d, colIdx) => {
      const ds = fmtDate(d);
      const isToday = ds === today;
      const isWeekend = d.getDay() === 0 || d.getDay() === 6;
      const dayTasks = state.tasks.filter(t => t.personId === p.id && isDateInRange(d, t.startDate, t.endDate));
      const addable = !dayTasks.length;
      const cell = document.createElement('div');
      cell.className = `gantt-day-cell${isWeekend?' weekend':''}${isToday?' today-col':''}${addable?' addable':''}`;
      cell.style.gridColumn = colIdx + 2;
      cell.style.gridRow = rowNum;
      cell.style.width = dayW + 'px';
      cell.dataset.date = ds;
      if (addable && !window.IS_READONLY) cell.onclick = () => openAddTaskModal(p.id, null, ds);
      table.appendChild(cell);
    });

    // 任务条：grid-column 精确定位，覆盖日期格子
    const personTasks = state.tasks
      .filter(t => t.personId === p.id)
      .sort((a,b) => parseDate(a.startDate) - parseDate(b.startDate));
    personTasks.forEach(task => {
      const sIdx = dates.findIndex(d => fmtDate(d) === task.startDate);
      const eIdx = dates.findIndex(d => fmtDate(d) === task.endDate);
      if (sIdx < 0 && eIdx < 0) return;
      const startCol = (sIdx >= 0 ? sIdx : 0) + 2;
      const endCol   = (eIdx >= 0 ? eIdx : dayCount - 1) + 2; // 包含结束日
      const conflict = checkConflict(task, p.id);
      const bar = document.createElement('div');
      bar.className = `gantt-bar ${task.type || 'custom'}${conflict?' has-conflict':''}`;
      bar.style.gridColumn = `${startCol} / ${endCol + 1}`;
      bar.style.gridRow = rowNum;
      bar.style.zIndex = 3;
      bar.dataset.taskId = task.id;
      bar.title = task.name;
      bar.innerHTML = `<span class="gantt-bar-icon" style="background:${task.color||'var(--primary)'}">${task.icon || '✨'}</span><span class="gantt-bar-text">${task.name}</span><span class="gantt-bar-resize-handle"></span><button class="gantt-bar-delete" onclick="event.stopPropagation();deleteTask('${task.id}')">✕</button>${conflict?'<div class="conflict-badge">!</div>':''}`;
      if(!window.IS_READONLY){
        bar.onmousedown = e => { e.stopPropagation(); startDrag(e, task.id); };
        bar.onmouseenter = e => showTooltip(e, task.id);
        bar.onmouseleave = () => hideTooltip();
        bar.onclick = e => { e.stopPropagation(); openEditTask(task.id); };
      } else {
        bar.style.cursor = 'default';
        bar.onmouseenter = e => showTooltip(e, task.id);
        bar.onmouseleave = () => hideTooltip();
      }
      table.appendChild(bar);
    });
  });
}

function checkConflict(task, personId) {
  const count = state.tasks.filter(t =>
    t.personId === personId &&
    t.id !== task.id &&
    dateRangesOverlap(task.startDate, task.endDate, t.startDate, t.endDate)
  ).length;
  return count > 1; // Overload = more than 1 concurrent task
}

function dateRangesOverlap(s1, e1, s2, e2) {
  return !(parseDate(e1) < parseDate(s2) || parseDate(e2) < parseDate(s1));
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function fmtDate(d) {
  if (!d) return '';
  const dd = new Date(d);
  const y = dd.getFullYear();
  const m = String(dd.getMonth() + 1).padStart(2, '0');
  const day = String(dd.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseDate(str) {
  if (!str) return new Date();
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function daysBetween(start, end) {
  const s = parseDate(start);
  const e = parseDate(end);
  return Math.round((e - s) / 86400000) + 1;
}

function isDateInRange(date, start, end) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const s = parseDate(start); s.setHours(0,0,0,0);
  const e = parseDate(end); e.setHours(0,0,0,0);
  return d >= s && d <= e;
}

function notify(msg, type = '') {
  const el = document.getElementById('notify');
  el.textContent = msg;
  el.className = 'notify show' + (type ? ' ' + type : '');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// BAR DRAG (move / resize)
let dragState = null;

function startDrag(event, taskId) {
  event.preventDefault();
  event.stopPropagation();
  const bar = event.currentTarget;
  const rect = bar.getBoundingClientRect();
  const isResize = event.clientX > rect.right - 15;
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;
  const dates = getDisplayDates();
  const startIndex = dates.findIndex(d => fmtDate(d) === task.startDate);
  const days = daysBetween(task.startDate, task.endDate);
  dragState = { taskId, startX: event.clientX, startIndex, days, isResize, bar, moved: false };
  bar.classList.add('dragging');
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', stopDrag);
}

function onDrag(event) {
  if (!dragState) return;
  const dx = event.clientX - dragState.startX;
  const dayDelta = Math.round(dx / DAY_WIDTH);
  if (dayDelta === 0) return;
  dragState.moved = true;
  if (dragState.isResize) {
    const newDays = Math.max(1, dragState.days + dayDelta);
    dragState.bar.style.width = (newDays * DAY_WIDTH - 4) + 'px';
  } else {
    const newStartIndex = Math.max(0, dragState.startIndex + dayDelta);
    dragState.bar.style.left = (newStartIndex * DAY_WIDTH + 2) + 'px';
  }
}

function stopDrag(event) {
  if (!dragState) return;
  const bar = dragState.bar;
  bar.classList.remove('dragging');
  const task = state.tasks.find(t => t.id === dragState.taskId);
  if (dragState.moved && task) {
    const dates = getDisplayDates();
    if (dragState.isResize) {
      const finalWidth = parseInt(bar.style.width);
      const newDays = Math.max(1, Math.round((finalWidth + 4) / DAY_WIDTH));
      const newEndIdx = dragState.startIndex + newDays - 1;
      if (dragState.startIndex >= 0 && newEndIdx >= 0 && newEndIdx < dates.length) {
        task.endDate = fmtDate(dates[newEndIdx]);
      }
    } else {
      const finalLeft = parseInt(bar.style.left);
      const newStartIdx = Math.round((finalLeft - 2) / DAY_WIDTH);
      if (newStartIdx >= 0 && newStartIdx < dates.length) {
        const newStart = dates[newStartIdx];
        const newEnd = addDays(newStart, dragState.days - 1);
        const newEndIdx = dates.findIndex(d => fmtDate(d) === fmtDate(newEnd));
        if (newEndIdx >= 0) {
          task.startDate = fmtDate(newStart);
          task.endDate = fmtDate(newEnd);
        }
      }
    }
    saveState();
    render();
    notify('✅ 任务已调整');
  } else {
    openAddTaskModal(null, dragState.taskId);
  }
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', stopDrag);
  dragState = null;
}

    if(h && h.startsWith("#data=")){
      try{
        var compressed=h.slice(6);
        var json=decodeURIComponent(escape(atob(compressed)));
        var d=JSON.parse(json);
        if(d.persons&&d.tasks){state.persons=d.persons;state.tasks=d.tasks}
        else if(d.record){state=d.record}
        if(typeof render==="function")render();
      }catch(e){console.error("hash data parse error",e)}
    }
    if(p.get("readonly")==="1"){
      window.IS_READONLY = true;

      d.innerHTML='<span>📋</span><span>只读模式 — 不可编辑</span><button onclick="exportTaskCSV()" style="margin-left:auto;padding:4px 12px;background:#4caf50;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px">📋 导出任务明细</button>';
      document.body.prepend(d);
